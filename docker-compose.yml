services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: arxiv-rag-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"   # REST API + Web dashboard (http://localhost:6333/dashboard)
      - "6334:6334"   # gRPC API
    volumes:
      - qdrant_storage:/qdrant/storage
    # Healthcheck lets `docker compose up --wait` block until Qdrant is actually ready.
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  qdrant_storage:
